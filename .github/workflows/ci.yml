name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install      # Install dependencies
      - run: pnpm format:check # Check code formatting
      - run: pnpm lint         # Run linting to ensure code quality
      - run: pnpm run build    # Ensure the project builds successfully