name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install # Install dependencies
      - run: pnpm format # Auto-fix formatting
      - run: pnpm format:check # Verify formatting is clean
      - run: pnpm lint # Run linting to ensure code quality
      - run: pnpm run build # Ensure the project builds successfully
